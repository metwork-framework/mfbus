daemon off;
worker_processes 1;
error_log  {{MODULE_RUNTIME_HOME}}/log/nginx_error.log debug;
pid        {{MODULE_RUNTIME_HOME}}/var/nginx.pid;

# Main Loop Configuration
events {
        worker_connections  10000;
}

# environment variables published to lua code (other than init_by_lua)
env MODULE_RUNTIME_HOME;
env MFBUS_TMP_BLOB_STORE_DEFAULT_LIFETIME;
env MFBUS_TMP_BLOB_STORE_MAX_NAMESPACE_SIZE_IN_BYTES;
env MFBUS_TMP_BLOB_STORE_MAX_NAMESPACE_SIZE;
env MFBUS_TMP_BLOB_STORE_MAX_LIFETIME;

# HTTP Configuration
http {
    include       mime.types;
    default_type  application/octet-stream;
    log_format  main  '[$time_local] from=$remote_addr request="$request" duration=$request_time status=$status reqlen=$request_length replen=$body_bytes_sent';
    access_log  {{MODULE_RUNTIME_HOME}}/log/nginx_access.log  main;
    proxy_temp_path {{MFBUS_NGINX_PROXY_TEMP_PATH}};
    client_body_temp_path {{MFBUS_NGINX_CLIENTBODY_TEMP_PATH}};
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    sendfile on;
    sendfile_max_chunk 512k;
    lua_package_path '{{MFBUS_HOME}}/config/?.lua;{{MFCOM_HOME}}/lib/?.lua;;';
    lua_code_cache on;

    server {
        aio threads;
        listen {{MFBUS_NGINX_PORT}} backlog=40000;

        ########################
        ##### NGINX STATUS #####
        ########################
        location ~ ^/status$ {
            stub_status on;
            access_log off;
        }

        ##########################
        ##### TMP_BLOB_STORE #####
        ##########################

        # Private service (upload)
        location ~ ^/__upload/(.*)$ {
            internal;
            access_log off;
            alias {{MFBUS_TMP_BLOB_STORE_STORAGE_DIR}}/$1;
            dav_methods PUT;
            create_full_put_path on;
            dav_access user:rw;
        }

        # Private service (download)
        location ~ ^/__download/(.*)$ {
            internal;
            access_log off;
            alias {{MFBUS_TMP_BLOB_STORE_STORAGE_DIR}}/$1;
        }

        # Private service (delete)
        location ~ ^/__delete/(.*)$ {
            internal;
            access_log off;
            dav_methods DELETE;
            alias {{MFBUS_TMP_BLOB_STORE_STORAGE_DIR}}/$1;
        }

        location ~ ^/tmp_blob_store/(.*)/blobs$ {
            content_by_lua_block {
                require("tmp_blob_store").new_blob(ngx.var[1])
            }
        }

        location ~ ^/tmp_blob_store/(.*)/blobs/(.*)$ {
            client_body_in_file_only on;
            content_by_lua_block {
                local tmp_blob_store = require("tmp_blob_store")
                if ngx.var.request_method == "DELETE" then
                    tmp_blob_store.delete_blob(ngx.var[1], ngx.var[2])
                elseif ngx.var.request_method == "GET" then
                    tmp_blob_store.get_blob(ngx.var[1], ngx.var[2])
                else
                    ngx.status=405
                end
            }
        }


	}
}
